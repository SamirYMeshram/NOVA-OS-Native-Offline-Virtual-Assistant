[core]
profile = "normal"
data_dir = "~/.nova"
audit_log = true

[ai]
provider = "ollama"
default_model = "llama3.2:3b"
embedding_model = "nomic-embed-text"
ollama_host = "http://127.0.0.1:11434"
allow_network = false

[security]
require_confirmation_for_file_writes = true
require_confirmation_for_shell = true
protected_paths = ["/", "/etc", "/usr", "/bin", "/sbin", "/boot", "C:\\Windows", "C:\\Program Files"]

[dashboard]
host = "127.0.0.1"
port = 8501
