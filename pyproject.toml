[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nova-sovereign-ai"
version = "0.1.0"
description = "Local-first privacy-preserving personal AI operating layer"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "NOVA Sovereign AI" }]
dependencies = [
  "requests>=2.31.0",
]

[project.optional-dependencies]
dashboard = ["streamlit>=1.32.0", "pandas>=2.0.0", "matplotlib>=3.8.0"]
documents = ["pypdf>=4.0.0", "python-docx>=1.1.0", "openpyxl>=3.1.0"]
system = ["psutil>=5.9.0"]
voice = ["sounddevice>=0.4.6", "pyttsx3>=2.90", "faster-whisper>=1.0.0"]
dev = ["pytest>=8.0.0", "ruff>=0.5.0"]
all = [
  "streamlit>=1.32.0", "pandas>=2.0.0", "matplotlib>=3.8.0",
  "pypdf>=4.0.0", "python-docx>=1.1.0", "openpyxl>=3.1.0",
  "psutil>=5.9.0", "pytest>=8.0.0", "ruff>=0.5.0"
]

[project.scripts]
nova = "nova.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["nova*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py310"
