[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nova-sovereign-ai"
version = "0.3.0"
description = "Local-first private Python AI operating layer with memory, documents, safe automation, plugins, dashboard, and local LLM support."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "NOVA Sovereign AI"}]
dependencies = [
  "pydantic>=2.6",
  "rich>=13.7",
  "tomli-w>=1.0.0; python_version < '3.11'",
]

[project.optional-dependencies]
full = [
  "streamlit>=1.35",
  "pandas>=2.2",
  "openpyxl>=3.1",
  "pypdf>=4.2",
  "python-docx>=1.1",
  "psutil>=5.9",
  "matplotlib>=3.8",
  "requests>=2.31",
  "watchdog>=4.0",
  "fastapi>=0.111",
  "uvicorn>=0.30",
]
voice = [
  "pyttsx3>=2.90",
  "sounddevice>=0.4",
]
dev = [
  "pytest>=8.0",
  "ruff>=0.5",
]

[project.scripts]
nova = "nova.cli:main"

[tool.setuptools.packages.find]
include = ["nova*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"
